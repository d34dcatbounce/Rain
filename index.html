<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rain Typography - Fixed Layout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root {
    --bg-color: #f4f4f0;
    --text-color: #111111;
    --font-main: 'Pretendard', -apple-system, sans-serif;
  }

  body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); overflow: hidden; -webkit-font-smoothing: antialiased; }

  #rainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; pointer-events: none; }

  .container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; position: relative; z-index: 10; text-align: center; padding: 0 10vw; box-sizing: border-box; }

  .text-block { position: relative; width: 100%; margin: 15px 0; outline: none; }

  /* 💡 수정됨: absolute를 relative로 변경하여 정상적으로 문장 배열이 되도록 복구 */
  .physics-letter { 
    display: inline-block; 
    white-space: pre; 
    position: relative; 
    font-size: clamp(2rem, 5vw, 3.5rem); 
    font-weight: 300; 
    transition: filter 0.1s, transform 0.05s linear; 
    transform-origin: center center; 
  }

  .falling { transition: filter 0.1s, transform 0.05s linear, opacity 1.5s ease-out; opacity: 0; }
</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;">
  <defs id="filter-defs">
    <filter id="baseDistortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="1" result="noise" class="turb" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" class="displace" />
    </filter>
  </defs>
</svg>

<canvas id="rainCanvas"></canvas>

<div class="container">
  <div class="text-block physics-target" data-threshold="8">모든 문장들은 비를 맞고 녹아내린다</div>
  <div class="text-block physics-target" data-threshold="12">활자는 물리적 질량을 가지고 주저앉는다</div>
  <div class="text-block physics-target" data-threshold="6">의미의 파편들</div>
</div>

<script>
  const { Engine, Bodies, Composite, Events, Body } = Matter;
  const engine = Engine.create();
  engine.world.gravity.y = 0.6;

  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  const filterDefs = document.getElementById('filter-defs');
  
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;
  let textBlocks = [];

  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  // 1. 텍스트를 개별 <span>으로 쪼개고 물리적 '블록'으로 만들기
  function initTextPhysics() {
    const targets = document.querySelectorAll('.physics-target');
    let filterIndex = 0;

    targets.forEach((target) => {
      const text = target.innerText;
      target.innerHTML = ''; 
      
      const chars = text.split('');
      const threshold = parseInt(target.getAttribute('data-threshold')) || 10;
      const letterNodes = [];

      chars.forEach((char) => {
        const span = document.createElement('span');
        span.className = 'physics-letter';
        span.innerText = char;
        target.appendChild(span);

        if (char.trim() !== '') {
          const filterId = `distort-${filterIndex++}`;
          const filterClone = document.getElementById('baseDistortion').cloneNode(true);
          filterClone.id = filterId;
          filterDefs.appendChild(filterClone);
          span.style.filter = `url(#${filterId})`;

          // 브라우저가 예쁘게 정렬해준 글자의 원래 위치를 측정
          const rect = span.getBoundingClientRect();
          const startX = rect.left + rect.width / 2;
          const startY = rect.top + rect.height / 2;
          
          const body = Bodies.rectangle(
            startX, startY, rect.width, rect.height, 
            { isStatic: true, restitution: 0.1, friction: 0.5, label: 'letter' }
          );

          letterNodes.push({
            dom: span,
            body: body,
            startX: startX, // 💡 수정됨: 초기 위치를 안전하게 저장
            startY: startY, // 💡 수정됨: 초기 위치를 안전하게 저장
            displaceNode: filterClone.querySelector('.displace')
          });

          Composite.add(engine.world, body);
        }
      });

      textBlocks.push({
        letters: letterNodes,
        damage: 0,
        threshold: threshold, 
        isCollapsed: false
      });
    });

    const floor = Bodies.rectangle(width / 2, height + 50, width * 2, 100, { isStatic: true });
    Composite.add(engine.world, floor);
  }

  // 2. 비 내리기
  const rainDrops = [];
  const MAX_RAIN_COUNT = 150; 

  function spawnRain() {
    if (rainDrops.length > MAX_RAIN_COUNT) return;

    const drop = Bodies.circle(Math.random() * width, -20, 5, {
      restitution: 0.1, friction: 0.8, label: 'rain'
    });

    Composite.add(engine.world, drop);
    rainDrops.push(drop);
  }

  // 3. 충돌 감지
  Events.on(engine, 'collisionStart', function(event) {
    event.pairs.forEach(pair => {
      let letterBody = null;
      if (pair.bodyA.label === 'letter') letterBody = pair.bodyA;
      if (pair.bodyB.label === 'letter') letterBody = pair.bodyB;

      if (letterBody && letterBody.isStatic) {
        for (let block of textBlocks) {
          if (block.isCollapsed) continue;

          const obj = block.letters.find(o => o.body === letterBody);
          if (obj) {
            block.damage += 1; 
            
            let currentDistortion = Math.min(block.damage * 0.8, 15);
            obj.displaceNode.setAttribute('scale', currentDistortion);

            if (block.damage > block.threshold) {
              collapseTextBlock(block);
            }
            break; 
          }
        }
      }
    });
  });

  // 4. 문장 무너뜨리기
  function collapseTextBlock(block) {
    block.isCollapsed = true;
    let finalDistortion = Math.min(block.damage * 1.2, 25);

    block.letters.forEach((obj, index) => {
      obj.displaceNode.setAttribute('scale', finalDistortion);
      
      setTimeout(() => {
        Body.setStatic(obj.body, false);
        Body.applyForce(obj.body, obj.body.position, {
          x: (Math.random() - 0.5) * 0.05, 
          y: Math.random() * 0.02
        });
        obj.dom.classList.add('falling');
      }, index * 20); // 글자가 왼쪽부터 오른쪽으로 순차적으로 타라락 떨어짐
    });
  }

  // 5. 애니메이션 루프
  function animate() {
    Engine.update(engine, 1000 / 60);
    ctx.clearRect(0, 0, width, height);

    if (Math.random() < 0.2) spawnRain();

    for (let i = rainDrops.length - 1; i >= 0; i--) {
      const drop = rainDrops[i];
      
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      ctx.font = "bold 20px serif"; 
      ctx.textAlign = "center";
      ctx.fillText("비", drop.position.x, drop.position.y);

      if (drop.position.y > height - 10 && Math.random() < 0.01) {
        Composite.remove(engine.world, drop);
        rainDrops.splice(i, 1);
      }
    }

    // 💡 수정됨: 매 프레임 좌표 재측정으로 인한 버그 제거. 오직 수학 계산만!
    textBlocks.forEach(block => {
      block.letters.forEach(obj => {
        if (!obj.body.isStatic) {
          const deltaX = obj.body.position.x - obj.startX;
          const deltaY = obj.body.position.y - obj.startY;
          const angle = obj.body.angle; 
          
          obj.dom.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${angle}rad) translateZ(0)`;
        }
      });
    });

    requestAnimationFrame(animate);
  }

  // 폰트 렌더링 후 좌표를 재기 위해 약간의 딜레이
  setTimeout(() => {
    initTextPhysics();
    animate();
  }, 300); 

</script>
</body>
</html>
