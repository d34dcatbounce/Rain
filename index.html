<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pretext Inspired Rain Collapse</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root {
    --bg-color: #f4f4f0;
    --text-color: #111111;
    --font-main: 'Pretendard', -apple-system, sans-serif;
  }

  body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); overflow: hidden; -webkit-font-smoothing: antialiased; }

  #rainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; pointer-events: none; }

  /* 중앙 정렬 레이아웃 복구 */
  .container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; position: relative; z-index: 10; text-align: center; padding: 0 10vw; box-sizing: border-box; }

  /* 물리 효과가 적용될 텍스트 블록 */
  .text-block { position: relative; width: 100%; margin: 15px 0; outline: none; }

  /* 개별 글자가 될 span */
  .physics-letter { display: inline-block; white-space: pre; position: absolute; /* Pretext 좌표로 절대 배치 */ font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; transition: filter 0.1s, transform 0.05s linear, rotate 0.05s linear; /* 미세한 transition으로 툭툭 끊기는 느낌 제거 */ transform-origin: center center; }

  /* 떨어지는 글자에 적용할 스타일 */
  .falling { transition: filter 0.1s, transform 0.05s linear, rotate 0.05s linear, opacity 2s ease-out; /* 페이드 아웃 추가 */ opacity: 0; /* 최종적으로 사라짐 */ }

</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;">
  <defs id="filter-defs">
    <filter id="baseDistortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="1" result="noise" class="turb" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" class="displace" />
    </filter>
  </defs>
</svg>

<canvas id="rainCanvas"></canvas>

<div class="container">
  <div class="text-block physics-target" data-damage-threshold="10">모든 문장들은 비를 맞고 녹아내린다</div>
  <div class="text-block physics-target" data-damage-threshold="15">활자는 물리적 질량을 가지고 주저앉는다</div>
  <div class="text-block physics-target" data-damage-threshold="8">의미의 파편들</div>
</div>

<script>
  // Matter.js 엔진 초기화
  const Engine = Matter.Engine,
        Render = Matter.Render,
        Runner = Matter.Runner,
        Bodies = Matter.Bodies,
        Composite = Matter.Composite,
        Events = Matter.Events;

  const engine = Engine.create();
  // 중력 설정 (아래로 떨어지는 힘)
  engine.world.gravity.y = 0.6;

  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  const filterDefs = document.getElementById('filter-defs');
  
  let width, height;
  let textBlocks = [];
  let isMobile = false;

  // 창 크기 변경 시 캔버스 및 파티클 재설정
  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    isMobile = width <= 768;
    // 실제 Pretext처럼 좌표를 다시 계산하는 로직은 여기서는 생략합니다.
  }
  window.addEventListener('resize', resize);
  resize();

  // 1. 텍스트를 개별 <span>으로 쪼개고 물리적 '블록'으로 만들기 (Pretext 철학의 응용)
  function initTextPhysics() {
    const targets = document.querySelectorAll('.physics-target');
    let filterIndex = 0;

    targets.forEach((target, blockIndex) => {
      const text = target.innerText;
      target.innerHTML = ''; // 기존 텍스트 제거
      
      const chars = text.split('');
      const threshold = parseInt(target.getAttribute('data-damage-threshold'));
      const letterNodes = [];

      chars.forEach((char, charIndex) => {
        const span = document.createElement('span');
        span.className = 'physics-letter';
        span.innerText = char;
        target.appendChild(span);

        // 여백(띄어쓰기)은 물리엔진 충돌체에서 제외
        if (char.trim() !== '') {
          // 고유 필터 생성 및 적용 (자글거림을 위해)
          const filterId = `distort-${filterIndex++}`;
          const filterClone = document.getElementById('baseDistortion').cloneNode(true);
          filterClone.id = filterId;
          filterDefs.appendChild(filterClone);
          span.style.filter = `url(#${filterId})`;

          // 글자의 화면상 위치와 크기 측정 (최초 1회)
          const rect = span.getBoundingClientRect();
          
          // Matter.js 사각형 물리 바디 생성 (처음엔 공중에 고정: isStatic true)
          // 💡 Pretext의 DOM-less 개념을 응용하여, Matter.js가 제공하는 (x, y) 데이터를 활용합니다.
          const body = Bodies.rectangle(
            rect.left + rect.width / 2, 
            rect.top + rect.height / 2, 
            rect.width, 
            rect.height, 
            { 
              isStatic: true, // 고정됨
              restitution: 0.1, // 비는 덜 튕기게
              friction: 0.5,    // 비가 글자 위에 더 잘 쌓이도록 마찰력 높임
              label: 'letter'
            }
          );

          letterNodes.push({
            dom: span,
            body: body,
            displaceNode: filterClone.querySelector('.displace')
          });

          Composite.add(engine.world, body);
        }
      });

      // 하나의 문장 블록으로 묶어서 관리
      textBlocks.push({
        container: target,
        letters: letterNodes,
        damage: 0,
        threshold: threshold, // 몇 번 맞아야 무너지는지
        isCollapsed: false
      });
    });

    // 화면 바닥(Floor) 생성 - 글자가 떨어졌을 때 화면 밖으로 나가지 않고 바닥에 쌓이게
    const floor = Bodies.rectangle(width / 2, height + 50, width * 2, 100, { isStatic: true });
    Composite.add(engine.world, floor);
  }

  // 2. 비 내리기 함수
  const rainDrops = [];
  const MAX_RAIN_COUNT = isMobile ? 80 : 150; // 비 밀도를 낮춤

  function spawnRain() {
    if (rainDrops.length > MAX_RAIN_COUNT) return;

    const x = Math.random() * width;
    // 빗방울을 원형 물리 바디로 생성
    const drop = Bodies.circle(x, -20, 5, {
      restitution: 0.1,
      friction: 0.8,    // 끈적하게 잘 쌓이도록 마찰력 높임
      label: 'rain'
    });

    Composite.add(engine.world, drop);
    rainDrops.push(drop);
  }

  // 3. 충돌 감지 (비가 글자에 부딪혔을 때)
  Events.on(engine, 'collisionStart', function(event) {
    event.pairs.forEach(pair => {
      let letterBody = null;
      if (pair.bodyA.label === 'letter') letterBody = pair.bodyA;
      if (pair.bodyB.label === 'letter') letterBody = pair.bodyB;

      if (letterBody && letterBody.isStatic) {
        // 어느 문장 블록의 글자인지 찾기
        for (let block of textBlocks) {
          if (block.isCollapsed) continue;

          const obj = block.letters.find(o => o.body === letterBody);
          if (obj) {
            block.damage += 1; // 문장 전체 데미지 증가
            
            // 왜곡 효과 업데이트 (타격감을 위해 순간적으로 자글거리게)
            let currentDistortion = Math.min(block.damage * 0.8, 15);
            obj.displaceNode.setAttribute('scale', currentDistortion);

            // 💡 임계점 돌파! 문장이 비의 무게를 견디지 못하고 무너짐
            if (block.damage > block.threshold) {
              collapseTextBlock(block);
            }
            break; // 해당 글자를 찾았으므로 루프 종료
          }
        }
      }
    });
  });

  // 4. 문장 블록 무너뜨리기 함수 (핵심 눈속임)
  function collapseTextBlock(block) {
    block.isCollapsed = true;
    
    // 블록 전체 데미지 기반 왜곡 수치 최종 적용
    let finalDistortion = Math.min(block.damage * 1.2, 25);

    // 블록 내 모든 글자의 고정을 풀고, 무작위 힘을 주어 흩뿌림
    block.letters.forEach((obj, index) => {
      obj.displaceNode.setAttribute('scale', finalDistortion);
      
      // 약간의 지연을 주어 한꺼번에 툭 떨어지는 느낌 제거
      setTimeout(() => {
        // Matter.js 바디 고정 해제 -> 중력 적용
        Matter.Body.setStatic(obj.body, false);
        
        // 무작위로 살짝 밀어내어 '부서지는' 느낌 추가
        Matter.Body.applyForce(obj.body, obj.body.position, {
          x: (Math.random() - 0.5) * 0.1, 
          y: Math.random() * 0.05
        });

        // 💡 CSS 클래스 추가: 미세한 transition과 페이드 아웃 시작
        obj.dom.classList.add('falling');
        
      }, index * 10); // 글자마다 10ms씩 지연
    });
  }

  // 5. 애니메이션 및 렌더링 루프 (초당 60프레임 최적화)
  function animate() {
    // 물리 엔진 1프레임 전진 (1000/60 = 16.67ms)
    // 💡 Pretext의 philosophy처럼 DOM 계산 없이 수학 연산만 수행하므로 매우 빠릅니다.
    Engine.update(engine, 1000 / 60);

    ctx.clearRect(0, 0, width, height);

    // 비 생성 빈도 조절 (0.1 확률)
    if (Math.random() < 0.2) spawnRain();

    // 비 그리기 및 메모리 정리
    for (let i = rainDrops.length - 1; i >= 0; i--) {
      const drop = rainDrops[i];
      
      // 💡 [최적화 2] 비의 존재감을 높임 (크기 키우고 굵게)
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      ctx.font = "bold 20px serif"; 
      ctx.textAlign = "center";
      
      // 물리 바디의 좌표에 "비" 글자 렌더링
      // 💡 Pretext처럼 DOM 측정이 아닌 물리 엔진의 숫자 데이터를 활용합니다.
      ctx.fillText("비", drop.position.x, drop.position.y);

      // 화면 아래로 떨어지거나 바닥에 닿은 비는 지우거나 그대로 둠
      // 바닥으로 떨어져 쌓이는 연출을 위해 일정 깊이 아래로 가면 삭제
      if (drop.position.y > height - 10 && Math.random() < 0.01) {
        Composite.remove(engine.world, drop);
        rainDrops.splice(i, 1);
      }
    }

    // 떨어지는 글자들(DOM)의 CSS transform 업데이트
    textBlocks.forEach(block => {
      block.letters.forEach(obj => {
        // 글자가 무너져서(isStatic: false) 이동했다면?
        if (!obj.body.isStatic) {
          // 물리 엔진 상의 원점(최초 BoundingClientRect의 중심)을 가져옵니다.
          const initialRect = obj.dom.getBoundingClientRect();
          const initialX = initialRect.left + initialRect.width / 2;
          const initialY = initialRect.top + initialRect.height / 2;

          // 💡 Matter.js가 계산한 현재 글자 바디의 중심 좌표
          const currentX = obj.body.position.x;
          const currentY = obj.body.position.y;
          
          // 미세한 transition 덕분에 `translateZ(0)`를 사용해 
          // 픽셀 정렬 문제를 완화하고 더 매끄럽게 보이게 합니다.
          const angle = obj.body.angle; // 라디안 각도 그대로 사용
          obj.dom.style.transform = `translate(${currentX - initialX}px, ${currentY - initialY}px) rotate(${angle}rad) translateZ(0)`;
        }
      });
    });

    requestAnimationFrame(animate);
  }

  // 초기화 및 실행
  setTimeout(() => {
    initTextPhysics();
    animate();
  }, 300); // 폰트 로딩 시간을 위해 약간 지연

</script>
</body>
</html>
