<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Physics Rain & Collapsing Text</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<style>
  :root {
    --bg-color: #f4f4f0;
    --text-color: #111111;
    --font-main: 'Pretendard', -apple-system, sans-serif;
  }

  body {
    margin: 0; padding: 0;
    background-color: var(--bg-color); color: var(--text-color);
    font-family: var(--font-main); overflow-x: hidden;
  }

  #rainCanvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 50; pointer-events: none;
  }

  /* 개별 글자가 될 span 스타일 */
  .physics-letter {
    display: inline-block; /* 물리적 변형(transform)을 위해 필수 */
    white-space: pre;
    transition: filter 0.1s;
    /* 필터가 개별 적용되도록 설정 */
    transform: translate(0px, 0px) rotate(0deg); 
  }

  .container { display: flex; min-height: 100vh; position: relative; z-index: 10; }

  header.sidebar {
    width: 250px; padding: 40px; position: fixed; height: 100vh; box-sizing: border-box;
  }
  header h1 { font-size: 1.2rem; margin: 0 0 2rem 0; }
  
  main.content {
    margin-left: 250px; padding: 80px 10vw 120px 40px; max-width: 1200px; box-sizing: border-box;
  }
  
  .content article { margin-bottom: 6rem; }
  .content h2 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; margin: 0 0 1.5rem 0; word-break: keep-all; }
  .content p { font-size: 1.05rem; line-height: 1.7; max-width: 650px; margin-bottom: 1.5rem; word-break: keep-all; }

  @media (max-width: 768px) {
    .container { flex-direction: column; }
    header.sidebar { width: 100%; height: auto; position: relative; padding: 30px 20px 20px 20px; }
    main.content { margin-left: 0; padding: 0 20px 80px 20px; }
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;">
  <defs id="filter-defs">
    <filter id="baseDistortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="1" result="noise" class="turb" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" class="displace" />
    </filter>
  </defs>
</svg>

<canvas id="rainCanvas"></canvas>

<div class="container">
  <header class="sidebar">
    <h1 class="physics-target">프로젝트 아카이브</h1>
  </header>

  <main class="content">
    <article>
      <h2 class="physics-target">무너지는 문장들의<br>중력과 무게</h2>
      <p class="physics-target">활자는 종이 위에 고정된 것이 아니라, 질량과 부피를 가진 사물처럼 행동한다.</p>
      <p class="physics-target">쏟아지는 비를 견디지 못하고 임계점에 다다르면, 의미의 뼈대는 속절없이 바닥으로 추락한다.</p>
    </article>
  </main>
</div>

<script>
  // Matter.js 엔진 초기화 세팅
  const Engine = Matter.Engine,
        Render = Matter.Render,
        Runner = Matter.Runner,
        Bodies = Matter.Bodies,
        Composite = Matter.Composite,
        Events = Matter.Events;

  const engine = Engine.create();
  // 물리엔진의 중력 설정 (아래로 떨어지는 힘)
  engine.world.gravity.y = 0.5;

  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  const filterDefs = document.getElementById('filter-defs');
  
  let width, height;
  let isMobile = false;

  // DOM 글자와 물리엔진 Body를 연결할 배열
  const letterObjects = []; 
  const rainDrops = [];

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    isMobile = width <= 768;
  }
  window.addEventListener('resize', resize);
  resize();

  // 1. 텍스트를 개별 <span>으로 쪼개고 물리적 '블록'으로 만들기
  function initTextPhysics() {
    const targets = document.querySelectorAll('.physics-target');
    let filterIndex = 0;

    targets.forEach(target => {
      // <br> 태그 등을 보존하기 위해 노드 단위로 분리
      const htmlString = target.innerHTML;
      target.innerHTML = ''; 

      // 임시로 글자 하나하나 쪼개기 (간단한 구현을 위해 텍스트만 처리)
      const parts = htmlString.split(/(<br>)/i);
      
      parts.forEach(part => {
        if (part.toLowerCase() === '<br>') {
          target.appendChild(document.createElement('br'));
        } else {
          for (let char of part) {
            const span = document.createElement('span');
            span.className = 'physics-letter';
            span.innerText = char;
            target.appendChild(span);

            // 여백(띄어쓰기)은 물리엔진 충돌체에서 제외
            if (char.trim() !== '') {
              // 고유 필터 생성 및 적용 (자글거림을 위해)
              const filterId = `distort-${filterIndex++}`;
              const filterClone = document.getElementById('baseDistortion').cloneNode(true);
              filterClone.id = filterId;
              filterDefs.appendChild(filterClone);
              span.style.filter = `url(#${filterId})`;

              // 글자의 화면상 위치와 크기 측정
              const rect = span.getBoundingClientRect();
              
              // Matter.js 사각형 물리 바디 생성 (처음엔 공중에 고정: isStatic true)
              const body = Bodies.rectangle(
                rect.left + rect.width / 2, 
                rect.top + rect.height / 2, 
                rect.width, 
                rect.height, 
                { 
                  isStatic: true, // 고정됨
                  restitution: 0.2, // 튕기는 탄성 (0~1)
                  friction: 0.5,    // 마찰력 (비가 덜 미끄러지게)
                  label: 'letter'
                }
              );

              // DOM 요소와 물리 바디를 하나로 묶어서 저장
              letterObjects.push({
                dom: span,
                body: body,
                startX: body.position.x,
                startY: body.position.y,
                hits: 0, // 빗방울 맞은 횟수 (무게)
                displaceNode: filterClone.querySelector('.displace')
              });

              // 물리 세계에 추가
              Composite.add(engine.world, body);
            }
          }
        }
      });
    });

    // 화면 바닥(Floor) 생성 - 글자가 떨어졌을 때 화면 밖으로 나가지 않고 바닥에 쌓이게
    const floor = Bodies.rectangle(width / 2, height + 50, width * 2, 100, { isStatic: true });
    Composite.add(engine.world, floor);
  }

  // 2. 비 내리기 함수
  function dropRain() {
    if (rainDrops.length > (isMobile ? 150 : 300)) return; // 빗방울 개수 제한 (성능)

    const x = Math.random() * width;
    // 빗방울을 원형 물리 바디로 생성
    const drop = Bodies.circle(x, -20, isMobile ? 4 : 5, {
      restitution: 0.1, // 비는 덜 튕기게
      friction: 0.8,    // 끈적하게 잘 쌓이도록 마찰력 높임
      density: 0.05,
      label: 'rain'
    });

    Composite.add(engine.world, drop);
    rainDrops.push(drop);
  }

  // 3. 충돌 감지 (비가 글자에 부딪혔을 때)
  Events.on(engine, 'collisionStart', function(event) {
    event.pairs.forEach(pair => {
      let letterBody = null;
      if (pair.bodyA.label === 'letter') letterBody = pair.bodyA;
      if (pair.bodyB.label === 'letter') letterBody = pair.bodyB;

      if (letterBody && letterBody.isStatic) {
        // 연결된 객체 찾기
        const obj = letterObjects.find(o => o.body === letterBody);
        if (obj) {
          obj.hits += 1; // 맞은 횟수 증가
          
          // 왜곡 효과 업데이트 (많이 맞을수록 자글거림)
          let distortion = obj.hits * 1.5;
          if (distortion > 20) distortion = 20;
          obj.displaceNode.setAttribute('scale', distortion);

          // 🚨 임계점 돌파! 비가 15번 이상 쌓이면 글자가 무너짐
          if (obj.hits > (isMobile ? 10 : 15)) {
            Matter.Body.setStatic(obj.body, false); // isStatic을 false로! -> 중력 적용
          }
        }
      }
    });
  });

  // 4. 애니메이션 및 렌더링 루프
  function animate() {
    // 물리 엔진 1프레임 전진
    Engine.update(engine, 1000 / 60);
    ctx.clearRect(0, 0, width, height);

    // 비 생성 (매 프레임마다 일정 확률로)
    if (Math.random() < 0.3) dropRain();
    if (Math.random() < 0.3) dropRain();

    ctx.textAlign = "center";
    
    // 비 그리기 및 메모리 정리
    for (let i = rainDrops.length - 1; i >= 0; i--) {
      const drop = rainDrops[i];
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      ctx.font = "12px serif";
      
      // 물리 바디의 좌표에 "비" 글자 렌더링
      ctx.fillText("비", drop.position.x, drop.position.y);

      // 화면 바닥에 닿은 비는 시간이 지나면 지우거나(메모리 방어) 그대로 둠
      // 여기서는 바닥으로 떨어져 쌓이는 연출을 위해 일정 깊이 아래로 가면 삭제
      if (drop.position.y > height - 10 && Math.random() < 0.01) {
        Composite.remove(engine.world, drop);
        rainDrops.splice(i, 1);
      }
    }

    // 떨어지는 글자들(DOM)의 CSS transform 업데이트
    letterObjects.forEach(obj => {
      // 글자가 무너져서(isStatic: false) 이동했다면?
      if (!obj.body.isStatic) {
        // 물리 엔진 상의 좌표 변화량을 계산
        const deltaX = obj.body.position.x - obj.startX;
        const deltaY = obj.body.position.y - obj.startY;
        // 각도 변환 (라디안 -> 디그리)
        const angle = obj.body.angle * (180 / Math.PI);

        // DOM 요소에 반영 (translate와 rotate로 글자가 빙글빙글 돌면서 떨어지게 함)
        obj.dom.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${angle}deg)`;
      }
    });

    requestAnimationFrame(animate);
  }

  // 초기화 및 실행
  setTimeout(() => {
    initTextPhysics();
    animate();
  }, 300); // 폰트 로딩 시간을 위해 약간 지연
</script>
</body>
</html>
