<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Avalanche Rain Typography</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root {
    --bg-color: #f4f4f0;
    --text-color: #111111;
    --font-main: 'Pretendard', -apple-system, sans-serif;
  }
  body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); overflow: hidden; -webkit-font-smoothing: antialiased; }
  
  #rainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; pointer-events: none; }
  
  .physics-letter { display: inline-block; white-space: pre; position: relative; font-size: clamp(2rem, 6vw, 4rem); font-weight: 200; transition: filter 0.1s; transform-origin: center; transform: translate(0,0) rotate(0); }
  
  .container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; position: relative; z-index: 10; text-align: center; }
  
  .physics-target { margin: 10px 0; max-width: 80%; }
</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;">
  <defs id="filter-defs">
    <filter id="baseDistortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" result="noise" class="turb" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" class="displace" />
    </filter>
  </defs>
</svg>

<canvas id="rainCanvas"></canvas>

<div class="container">
  <h1 class="physics-target">무너지는 문장들</h1>
  <p class="physics-target">쏟아지는 빗속에서 의미의 뼈대는 속절없이 주저앉는다.</p>
  <p class="physics-target">우수수, 투둑, 바닥으로 추락하는 기억의 파편들.</p>
</div>

<script>
  const { Engine, Bodies, Composite, Events, Body } = Matter;
  const engine = Engine.create();
  
  // 💡 [최적화 1] 중력 강화 (비와 글자가 더 빠르고 무겁게 떨어지도록)
  engine.world.gravity.y = 0.8; 

  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  const filterDefs = document.getElementById('filter-defs');
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  const letterObjects = [];
  const rainDrops = []; 
  
  // 💡 [최적화 2] 비의 밀도 증가 (화면에 동시에 존재하는 빗방울 최대 개수 상향)
  const MAX_RAIN_COUNT = width < 768 ? 200 : 400; 

  // 1. 텍스트 물리 객체화
  function initTextPhysics() {
    const targets = document.querySelectorAll('.physics-target');
    let filterIndex = 0;

    targets.forEach(target => {
      const text = target.innerText;
      target.innerHTML = '';
      for (let char of text) {
        const span = document.createElement('span');
        span.className = 'physics-letter';
        span.innerText = char;
        target.appendChild(span);

        if (char.trim() !== '') {
          const filterId = `distort-${filterIndex++}`;
          const filterClone = document.getElementById('baseDistortion').cloneNode(true);
          filterClone.id = filterId;
          filterDefs.appendChild(filterClone);
          span.style.filter = `url(#${filterId})`;

          const rect = span.getBoundingClientRect();
          // 글자 크기를 살짝 줄여서 충돌 영역을 더 정밀하게 (우수수 느낌 증가)
          const body = Bodies.rectangle(
            rect.left + rect.width / 2, 
            rect.top + rect.height / 2, 
            rect.width * 0.9, rect.height * 0.9, 
            { isStatic: true, friction: 0.7, label: 'letter', density: 0.1 }
          );

          letterObjects.push({
            dom: span, body: body, startX: body.position.x, startY: body.position.y,
            hits: 0, displaceNode: filterClone.querySelector('.displace')
          });
          Composite.add(engine.world, body);
        }
      }
    });

    const floor = Bodies.rectangle(width / 2, height + 50, width * 2, 100, { isStatic: true });
    Composite.add(engine.world, floor);
  }

  // 2. 빗방울 생성 및 수명 관리
  function spawnRain() {
    // 메모리 순환 최적화 (가장 오래된 비 삭제)
    if (rainDrops.length >= MAX_RAIN_COUNT) {
      const oldestDrop = rainDrops.shift();
      Composite.remove(engine.world, oldestDrop);
    }

    // 비가 화면 전체 너비에서 쏟아지도록
    const x = Math.random() * width;
    
    // 💡 [최적화 3] 빗방울 강화 (탄성을 줄여 잘 끈적하게 달라붙고 쌓이게)
    const drop = Bodies.circle(x, -20, Math.random() < 0.1 ? 7 : 5, {
      friction: 0.6, density: 0.08, restitution: 0.05, label: 'rain'
    });

    Composite.add(engine.world, drop);
    rainDrops.push(drop);
  }

  // 3. 충돌 이벤트
  Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
      const bodyA = pair.bodyA;
      const bodyB = pair.bodyB;
      const letterBody = bodyA.label === 'letter' ? bodyA : (bodyB.label === 'letter' ? bodyB : null);

      if (letterBody && letterBody.isStatic) {
        const obj = letterObjects.find(o => o.body === letterBody);
        if (obj) {
          obj.hits += 1;
          obj.displaceNode.setAttribute('scale', Math.min(obj.hits * 2.5, 30));
          
          // 💡 [핵심] 임계점 대폭 하향: 비를 3번만 맞으면 고정이 풀려 추락함 ("우수수" 연출)
          if (obj.hits >= 3) {
            Body.setStatic(obj.body, false);
            // 약간의 랜덤한 회전력을 주어 떨어질 때 더 극적으로
            Body.setAngularVelocity(obj.body, (Math.random() - 0.5) * 0.1); 
          }
        }
      }
    });
  });

  // 4. 애니메이션 루프
  function animate() {
    Engine.update(engine, 1000 / 60);
    ctx.clearRect(0, 0, width, height);

    // 💡 [최적화 4] 비 생성 빈도 증가: 한 프레임에 여러 개를 생성해 폭우 연출
    if (Math.random() < 0.8) spawnRain();
    if (Math.random() < 0.8) spawnRain();
    if (Math.random() < 0.8) spawnRain();

    // 빗방울 렌더링
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
    ctx.font = "14px serif";
    ctx.textAlign = "center";

    rainDrops.forEach((drop, index) => {
      // 오래될수록 살짝 투명하게
      const opacity = Math.min(index / (MAX_RAIN_COUNT * 0.8), 1.0);
      ctx.globalAlpha = opacity;
      
      // 비 크기에 따라 다르게 그리기 (선택 사항)
      const size = drop.circleRadius;
      ctx.font = `${size * 2.5}px serif`;
      ctx.fillText("비", drop.position.x, drop.position.y);
    });
    ctx.globalAlpha = 1.0;

    // 글자 DOM 업데이트
    letterObjects.forEach(obj => {
      if (!obj.body.isStatic) {
        const dX = obj.body.position.x - obj.startX;
        const dY = obj.body.position.y - obj.startY;
        const angle = obj.body.angle * (180 / Math.PI);
        // rotate를 더 극적으로 주기 위해 transform 적용
        obj.dom.style.transform = `translate(${dX}px, ${dY}px) rotate(${angle}deg)`;
      }
    });

    requestAnimationFrame(animate);
  }

  // 화면 크기 조정 처리
  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  // 초기화 및 실행
  setTimeout(() => {
    initTextPhysics();
    animate();
  }, 300);
</script>
</body>
</html>
