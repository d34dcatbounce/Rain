<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Infinite Physics Rain - Optimization</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  :root {
    --bg-color: #f4f4f0;
    --text-color: #111111;
  }
  body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow: hidden; }
  #rainCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; pointer-events: none; }
  .physics-letter { display: inline-block; white-space: pre; position: relative; font-size: 3rem; font-weight: 300; transition: filter 0.1s; transform-origin: center; }
  .container { padding: 80px 40px; position: relative; z-index: 10; pointer-events: none; }
</style>
</head>
<body>

<svg width="0" height="0" style="position: absolute;">
  <defs id="filter-defs">
    <filter id="baseDistortion">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" result="noise" class="turb" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" class="displace" />
    </filter>
  </defs>
</svg>

<canvas id="rainCanvas"></canvas>

<div class="container">
  <h1 class="physics-target">기억은 빗물에 씻겨</h1>
  <p class="physics-target">오래된 문장부터 하나씩 바닥으로 무너져 내린다.</p>
</div>

<script>
  const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
  const engine = Engine.create();
  engine.world.gravity.y = 0.4; // 중력을 살짝 가볍게

  const canvas = document.getElementById('rainCanvas');
  const ctx = canvas.getContext('2d');
  const filterDefs = document.getElementById('filter-defs');
  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  const letterObjects = [];
  const rainDrops = []; // 빗방울 객체들을 담는 큐(Queue)
  const MAX_RAIN_COUNT = 250; // 화면에 동시에 존재할 수 있는 최대 빗방울 수

  // 1. 텍스트 물리 객체화
  function initTextPhysics() {
    const targets = document.querySelectorAll('.physics-target');
    let filterIndex = 0;

    targets.forEach(target => {
      const text = target.innerText;
      target.innerHTML = '';
      for (let char of text) {
        const span = document.createElement('span');
        span.className = 'physics-letter';
        span.innerText = char;
        target.appendChild(span);

        if (char.trim() !== '') {
          const filterId = `distort-${filterIndex++}`;
          const filterClone = document.getElementById('baseDistortion').cloneNode(true);
          filterClone.id = filterId;
          filterDefs.appendChild(filterClone);
          span.style.filter = `url(#${filterId})`;

          const rect = span.getBoundingClientRect();
          const body = Bodies.rectangle(
            rect.left + rect.width / 2, 
            rect.top + rect.height / 2, 
            rect.width, rect.height, 
            { isStatic: true, friction: 0.6, label: 'letter' }
          );

          letterObjects.push({
            dom: span, body: body, startX: body.position.x, startY: body.position.y,
            hits: 0, displaceNode: filterClone.querySelector('.displace')
          });
          Composite.add(engine.world, body);
        }
      }
    });

    const floor = Bodies.rectangle(width / 2, height + 50, width * 2, 100, { isStatic: true });
    Composite.add(engine.world, floor);
  }

  // 2. 빗방울 생성 및 수명 관리
  function spawnRain() {
    // 💡 핵심 최적화: 최대 개수를 넘어가면 가장 오래된 비(배열의 첫 번째)부터 제거
    if (rainDrops.length >= MAX_RAIN_COUNT) {
      const oldestDrop = rainDrops.shift(); // 배열에서 빼고
      Composite.remove(engine.world, oldestDrop); // 물리 세계에서 지우기
    }

    const drop = Bodies.circle(Math.random() * width, -20, 5, {
      friction: 0.5, density: 0.01, label: 'rain',
      render: { opacity: 1 } // 수명에 따라 투명도를 조절하기 위한 커스텀 속성
    });

    Composite.add(engine.world, drop);
    rainDrops.push(drop);
  }

  // 3. 충돌 이벤트
  Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
      const bodyA = pair.bodyA;
      const bodyB = pair.bodyB;
      const letterBody = bodyA.label === 'letter' ? bodyA : (bodyB.label === 'letter' ? bodyB : null);

      if (letterBody && letterBody.isStatic) {
        const obj = letterObjects.find(o => o.body === letterBody);
        if (obj) {
          obj.hits += 1;
          obj.displaceNode.setAttribute('scale', Math.min(obj.hits * 1.5, 25));
          if (obj.hits > 12) Body.setStatic(obj.body, false); // 12번 맞으면 추락
        }
      }
    });
  });

  // 4. 애니메이션 루프
  function animate() {
    Engine.update(engine, 1000 / 60);
    ctx.clearRect(0, 0, width, height);

    // 일정 확률로 비 생성
    if (Math.random() < 0.5) spawnRain();

    // 빗방울 렌더링
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
    ctx.font = "14px serif";
    ctx.textAlign = "center";

    rainDrops.forEach((drop, index) => {
      // 바닥에 가까워질수록 혹은 오래될수록 투명도를 낮추는 연출 (선택 사항)
      const opacity = index / rainDrops.length; // 큐의 순서대로 투명도 차별화
      ctx.globalAlpha = opacity;
      ctx.fillText("비", drop.position.x, drop.position.y);
    });
    ctx.globalAlpha = 1.0;

    // 글자 DOM 업데이트
    letterObjects.forEach(obj => {
      if (!obj.body.isStatic) {
        const dX = obj.body.position.x - obj.startX;
        const dY = obj.body.position.y - obj.startY;
        const angle = obj.body.angle * (180 / Math.PI);
        obj.dom.style.transform = `translate(${dX}px, ${dY}px) rotate(${angle}deg)`;
      }
    });

    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  setTimeout(() => {
    initTextPhysics();
    animate();
  }, 300);
</script>
</body>
</html>
